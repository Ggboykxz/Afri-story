name: 📊 Lighthouse CI

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Setup Preview
        run: |
          npm run preview -- --port 4173 &
          sleep 15

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:4173/
            http://localhost:4173/explore
            http://localhost:4173/rankings
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json

      - name: Create issue for poor scores
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = { runs: [] };
            try {
              const files = fs.readdirSync('.lighthouseci');
              const latest = files.filter(f => f.startsWith('lhr-'))[files.length - 1];
              if (latest) results = JSON.parse(fs.readFileSync('.lighthouseci/' + latest, 'utf8'));
            } catch (e) {}

            const avg = (arr, key) => arr.length ? Math.round(arr.reduce((a, b) => a + (b[key] || 0), 0) / arr.length) : 0;

            const issueBody = '## 📊 Lighthouse Performance Alert\n\n**Date:** ' + new Date().toISOString().split('T')[0] + '\n\n### Performance Scores\n| Page | Performance | Accessibility | Best Practices | SEO |\n|------|-------------|---------------|----------------|-----|\n' + (results.runs?.map(r => '| ' + r.summary.url + ' | ' + r.summary.performance + ' | ' + r.summary.accessibility + ' | ' + r.summary['best-practices'] + ' | ' + r.summary.seo + ' |').join('\n') || 'N/A') + '\n\n### Recommendations\n- Performance < 90: Optimize images, reduce bundle size\n- Accessibility < 90: Add ARIA labels, improve contrast\n- Best Practices < 90: Fix security issues, add meta tags\n\n---\n*Auto-generated by AfriStory Lighthouse CI*';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[LIGHTHOUSE] Performance Alert',
              body: issueBody,
              labels: ['performance', 'lighthouse']
            });