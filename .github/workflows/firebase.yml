name: Deploy to Firebase

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy Firestore Rules
        run: |
          if [ -n "${{ secrets.FIREBASE_TOKEN }}" ]; then
            firebase deploy --only firestore:rules --token "${{ secrets.FIREBASE_TOKEN }}" || echo "Skipping Firestore rules (requires billing)"
          else
            echo "FIREBASE_TOKEN not set - skipping Firestore deployment"
          fi
      
      - name: Deploy Storage Rules
        if: success()
        run: |
          if [ -n "${{ secrets.FIREBASE_TOKEN }}" ]; then
            firebase deploy --only storage --token "${{ secrets.FIREBASE_TOKEN }}" || echo "Skipping Storage rules"
          fi
      
      - name: Deploy Hosting
        if: success()
        run: |
          if [ -n "${{ secrets.FIREBASE_TOKEN }}" ]; then
            firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
          else
            echo "Skipping - no Firebase token configured"
          fi