name: 🔗 Link Checker

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check main routes
        run: |
          URL="https://afri-story.vercel.app"
          echo "Checking $URL..."
          
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "Home: $code"
          
          for path in /explore /library /forum /rankings /shop /login /signup /terms /privacy /faq /about; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL$path" || echo "000")
            echo "$path: $code"
          done

      - name: Check response times
        run: |
          URL="https://afri-story.vercel.app"
          echo "Response times:"
          curl -w "Home: %{time_total}s\n" -s -o /dev/null "$URL"
          curl -w "Explore: %{time_total}s\n" -s -o /dev/null "$URL/explore"
          curl -w "Rankings: %{time_total}s\n" -s -o /dev/null "$URL/rankings"

      - name: Success
        run: echo "✅ All routes responding!"