name: 🔗 Link Checker

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to check'
        required: true
        default: 'https://afri-story.vercel.app'

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Check for broken links
        id: link-check
        run: |
          cat > check-links.js << 'EOF'
          const { chromium } = require('playwright');

          const BASE_URL = process.env.INPUT_URL || 'https://afri-story.vercel.app';

          const results = {
            url: BASE_URL,
            timestamp: new Date().toISOString(),
            links: [],
            broken: [],
            redirected: []
          };

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            // Collect all links
            await page.goto(BASE_URL, { waitUntil: 'networkidle', timeout: 30000 });
            const links = await page.$$eval('a[href]', anchors => 
              anchors.map(a => ({
                href: a.href,
                text: a.textContent?.trim().substring(0, 50)
              })).filter(l => l.href.startsWith('http'))
            );

            // Remove duplicates
            const uniqueLinks = [...new Map(links.map(l => [l.href, l])).values()];

            console.log(`Found ${uniqueLinks.length} unique links to check...`);

            for (const link of uniqueLinks.slice(0, 50)) {
              try {
                const response = await page.goto(link.href, {
                  waitUntil: 'domcontentloaded',
                  timeout: 10000
                });

                const status = response?.status() || 0;

                results.links.push({
                  url: link.href,
                  status,
                  text: link.text
                });

                if (status >= 400) {
                  results.broken.push({
                    url: link.href,
                    status,
                    text: link.text
                  });
                } else if (status >= 300 && status < 400) {
                  results.redirected.push({
                    url: link.href,
                    status,
                    text: link.text
                  });
                }

                if (status < 400) {
                  console.log(`✓ ${link.text?.substring(0, 30)}: ${status}`);
                } else {
                  console.log(`✗ ${link.href}: ${status}`);
                }

              } catch (e) {
                results.broken.push({
                  url: link.href,
                  error: e.message,
                  text: link.text
                });
                console.log(`✗ ${link.href}: ERROR - ${e.message}`);
              }
            }

            await browser.close();

            // Save results
            const fs = require('fs');
            fs.writeFileSync('link-check-results.json', JSON.stringify(results, null, 2));

            console.log('\n--- LINK CHECK SUMMARY ---');
            console.log('Total links:', results.links.length);
            console.log('Broken:', results.broken.length);
            console.log('Redirected:', results.redirected.length);

            if (results.broken.length > 0) {
              process.exit(1);
            }
          })();
          EOF
          node check-links.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-results
          path: link-check-results.json

      - name: Create issue for broken links
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = { broken: [], redirected: [] };
            try {
              results = JSON.parse(fs.readFileSync('link-check-results.json', 'utf8'));
            } catch (e) {}

            if (results.broken.length > 0) {
              const issueBody = '## 🔗 Broken Links Found\n\n**Date:** ' + new Date().toISOString().split('T')[0] + '\n**URL:** ' + results.url + '\n\n### Summary\n- Total links checked: ' + (results.links.length || 0) + '\n- Broken links: ' + results.broken.length + '\n- Redirected links: ' + results.redirected.length + '\n\n### Broken Links\n' + results.broken.map(l => '- [`' + (l.status || 'ERROR') + '`](' + l.url + ') - ' + (l.text || 'No text')).join('\n') + '\n\n---\n*Auto-generated by AfriStory Link Checker*';

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[LINK CHECK] ' + results.broken.length + ' Broken Links Found',
                body: issueBody,
                labels: ['bug', 'links']
              });
            }

      - name: Success
        if: success()
        run: echo "✅ All links are valid!"